<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photoweb</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to right,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:90%;
    max-width:700px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#0077ff;
    margin-bottom:20px;
}

input[type="text"]{
    width:80%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:15px;
}

input[type="file"]{
    margin:20px 0;
    padding:10px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.photo-box{
    position:relative;
}

.photo-box img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    border:3px solid #0077ff;
    transition:0.3s;
    cursor:pointer;
}

.caption{
    position:absolute;
    bottom:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:5px 10px;
    border-radius:5px;
    font-size:14px;
}

.note{
    margin-top:15px;
    color:gray;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Photoweb</h1>

<p>Upload and view your photos anytime</p>

<input type="text" id="captionInput"
placeholder="Enter text for image">

<br>

<input type="file" id="photoInput"
accept="image/*" multiple>

<div class="gallery" id="gallery"></div>

<p class="note">
Photos and text stay even after refresh.
</p>

</div>

<script>

const photoInput =
document.getElementById('photoInput');

const gallery =
document.getElementById('gallery');

const captionInput =
document.getElementById('captionInput');

function savePhotos(data){

    localStorage.setItem(
        "photoData",
        JSON.stringify(data)
    );

}

function loadPhotos(){

    const saved =
    JSON.parse(localStorage.getItem("photoData")) || [];

    saved.forEach(item => {

        createPhoto(item.image,item.caption);

    });

}

function createPhoto(imageSrc, captionText){

    const box =
    document.createElement('div');

    box.className = 'photo-box';

    const img =
    document.createElement('img');

    img.src = imageSrc;

    const caption =
    document.createElement('div');

    caption.className = 'caption';

    caption.innerText = captionText;

    box.appendChild(img);

    box.appendChild(caption);

    gallery.appendChild(box);

    box.onclick = function(){

        if(img.style.height === "400px"){

            img.style.height = "150px";

        }
        else{

            img.style.height = "400px";

        }

    };

}

photoInput.addEventListener('change', function(){

    const files = this.files;

    let saved =
    JSON.parse(localStorage.getItem("photoData")) || [];

    for(let i=0;i<files.length;i++){

        const file = files[i];

        if(file.type.startsWith('image/')){

            const reader = new FileReader();

            reader.onload = function(e){

                const imageData =
                e.target.result;

                const captionText =
                captionInput.value;

                createPhoto(
                    imageData,
                    captionText
                );

                saved.push({
                    image:imageData,
                    caption:captionText
                });

                savePhotos(saved);

            };

            reader.readAsDataURL(file);

        }

    }

});

window.onload = loadPhotos;

</script>

</body>
</html>
